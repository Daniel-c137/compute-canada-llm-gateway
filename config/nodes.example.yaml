# Rorqual — values from `sinfo -o "%P %G"` on rorqual1 (2026).
# Partitions: gpubase_bygpu_b1..b5 (per-GPU), gpubase_bynode_b1..b5 (whole node),
#   gpubase_interac (interactive GPU), gpubackfill.
# Pick billing bucket b1..b5 per your group / documentation (b1 is a common default).

ssh_host: "rorqual.alliancecan.ca"
ssh_user: "your_cc_username"
# Optional: path to SSH ControlMaster socket for Duo/MFA (see README). Same as CC_SSH_CONTROL_SOCKET.
# ssh_control_socket: "~/.ssh/cm-rorqual"
slurm_account: "rrg-tayebi"
python_module: "python/3.11"
# Login: list module loads in order; include opencv before venv (Alliance / vLLM + pip --no-index).
# extra_login_modules:
#   - "gcc"
#   - "cuda/12.6"
#   - "gcc opencv/4.12.0"
# extra_compute_modules:
#   - "gcc"
#   - "cuda/12.6"
#   - "gcc opencv/4.12.0"
# Optional: extra arguments after `--dtype auto` on the vLLM api_server line (preset can override).
# extra_vllm_cli:
#   - "--trust-remote-code"
remote_subdir: "cc-llm-runs"
# Optional: Hugging Face snapshot dir under $HOME — same repo id reuses the same folder across runs.
# hf_hub_weights_parent: "cc-llm-hf-weights"

presets:
  - id: "rorqual_h100_full_1"
    label: "1× full H100 (gpubase_bygpu_b1, highest RGU — larger vLLM)"
    partition: "gpubase_bygpu_b1"
    gpus_per_node: "h100:1"
    cpus_per_task: 24
    mem: "256G"
    extra_sbatch: []

  # MIG presets: Slurm often sets CUDA_VISIBLE_DEVICES to MIG-… UUIDs. vLLM 0.20.x may crash with
  # ValueError: invalid literal for int() … 'MIG-…'. Prefer rorqual_h100_full_1 unless you have a vLLM build that fixes this.
  - id: "rorqual_h100_mig_3g_1"
    label: "1× MIG 3g.40GB slice (lower RGU — medium/small models; may break vLLM 0.20 on some sites)"
    partition: "gpubase_bygpu_b1"
    gpus_per_node: "nvidia_h100_80gb_hbm3_3g.40gb:1"
    cpus_per_task: 8
    mem: "48G"
    extra_sbatch: []

  - id: "rorqual_h100_mig_2g_1"
    label: "1× MIG 2g.20GB slice (may break vLLM 0.20 + MIG UUID — prefer full H100 if you see int(MIG-…) errors)"
    partition: "gpubase_bygpu_b1"
    gpus_per_node: "nvidia_h100_80gb_hbm3_2g.20gb:1"
    cpus_per_task: 6
    mem: "24G"
    extra_sbatch: []

  - id: "rorqual_h100_mig_1g_1"
    label: "1× MIG 1g.10GB slice (tiny models only; vLLM 0.20 often fails with MIG-… device ids — use full H100 for vLLM)"
    partition: "gpubase_bygpu_b1"
    gpus_per_node: "nvidia_h100_80gb_hbm3_1g.10gb:1"
    cpus_per_task: 4
    mem: "12G"
    extra_sbatch: []

  - id: "rorqual_gpu_interac_3g"
    label: "Interactive partition (check max walltime); MIG 3g — vLLM 0.20 + MIG UUID may fail; see README"
    partition: "gpubase_interac"
    gpus_per_node: "nvidia_h100_80gb_hbm3_3g.40gb:1"
    cpus_per_task: 8
    mem: "48G"
    extra_sbatch: []
